name: Release W4DJ

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--bundles dmg'
            asset_name: 'W4DJ-RKB-macOS-Apple-Silicon-v[version][ext]'
          - platform: 'macos-15-intel'
            args: '--bundles dmg'
            asset_name: 'W4DJ-RKB-macOS-Intel-v[version][ext]'
          - platform: 'windows-latest'
            args: '--bundles nsis'
            asset_name: 'W4DJ-RKB-Windows-Installer-v[version][setup][ext]'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        working-directory: ./app
        run: npm install

      - name: Build Frontend
        working-directory: ./app
        run: npm run build

      - name: Create binaries directory (macOS)
        if: runner.os == 'macOS'
        run: mkdir -p src-tauri/binaries

      - name: Create binaries directory (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null

      - name: Download ffmpeg sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L -o src-tauri/binaries/ffmpeg-aarch64-apple-darwin https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-darwin-arm64
          curl -L -o src-tauri/binaries/ffmpeg-x86_64-apple-darwin https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-darwin-x64
          chmod +x src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-x86_64-apple-darwin

      - name: Download ffmpeg sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-win32-x64" -OutFile "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'W4DJ ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your computer: Apple Silicon Mac, Intel Mac, or Windows.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          releaseAssetNamePattern: ${{ matrix.asset_name }}
